# Deploy the Python NLP API on Render (free tier works for class demos; first boot is slow).
# After deploy, set VITE_API_URL on Netlify to your Render URL (no trailing slash).
services:
  - type: web
    name: resume-screener-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt && python -m spacy download en_core_web_sm
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: ALLOWED_ORIGINS
        value: "*"
